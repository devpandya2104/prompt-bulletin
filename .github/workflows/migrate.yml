name: Run DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**.sql'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run changed SQL migrations in order
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi

          # Find SQL files changed in this push, sorted alphabetically
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/*.sql' | sort)

          if [ -z "$CHANGED" ]; then
            echo "✓ No SQL files changed — nothing to migrate."
            exit 0
          fi

          echo "📋 Migrations to run:"
          echo "$CHANGED"
          echo ""

          for f in $CHANGED; do
            echo "▶ Running $f ..."
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            echo "✓ Done: $f"
          done
          echo ""
          echo "🎉 All migrations completed successfully."
