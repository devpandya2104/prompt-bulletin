const { useState, useEffect, useRef, useCallback } = React;

// ─── TWEAKS PANEL ────────────────────────────────────────────────────────────

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" data-noncommentable=""
         style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" aria-label="Close tweaks"
                onMouseDown={(e) => e.stopPropagation()}
                onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

    fire:         <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg>,
    zap:          <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    check:        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    globe:        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
  };
  return icons[name] || null;
};

// ─── TOOL CARD ────────────────────────────────────────────────────────────────

function ToolCard({ tool }) {
  const [upvoted, setUpvoted] = useState(false);
  const [count, setCount] = useState(tool.upvotes);
  const [hover, setHover] = useState(false);

  const handleUpvote = (e) => {
    e.stopPropagation();
    setUpvoted(u => !u);
    setCount(c => upvoted ? c - 1 : c + 1);
  };

  const tagColors = {
    editor: { bg: 'oklch(72% 0.19 52 / 0.15)',  color: 'var(--accent)' },
    top:    { bg: 'oklch(72% 0.19 198 / 0.12)', color: 'var(--accent2)' },
  };
  const badgeColors = { Trending: '#f59e0b', Hot: '#ef4444', New: '#10b981' };

  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: hover ? 'rgba(255,255,255,0.03)' : 'var(--bg2)',
        border: `1px solid ${hover ? 'var(--border2)' : 'var(--border)'}`,
        borderRadius: 14, padding: '20px 22px', cursor: 'pointer',
        transition: 'all 0.2s', display: 'flex', flexDirection: 'column', gap: 14,
      }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, flexWrap: 'wrap' }}>
            <span style={{ fontFamily: 'var(--font-head)', fontSize: 16, fontWeight: 700, color: 'var(--text)' }}>{tool.name}</span>
            {tool.tag && (
              <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 100, background: tagColors[tool.tagType]?.bg, color: tagColors[tool.tagType]?.color, whiteSpace: 'nowrap' }}>
                {tool.tag}
              </span>
            )}
            {tool.badge && (
              <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 100, background: `${badgeColors[tool.badge]}22`, color: badgeColors[tool.badge], whiteSpace: 'nowrap' }}>
                {tool.badge}
              </span>
            )}
          </div>
          <p style={{ fontSize: 13.5, color: 'var(--text2)', lineHeight: 1.55, margin: 0 }}>{tool.desc}</p>
        </div>
        {/* Upvote */}
        <button onClick={handleUpvote} style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
          padding: '8px 10px', borderRadius: 10, flexShrink: 0,
          background: upvoted ? 'var(--accent-dim)' : 'rgba(255,255,255,0.04)',
          border: `1px solid ${upvoted ? 'var(--accent)' : 'var(--border)'}`,
          cursor: 'pointer', transition: 'all 0.15s',
        }}>
          <Icon name="arrowUp" size={14} color={upvoted ? 'var(--accent)' : 'var(--text3)'} />
          <span style={{ fontSize: 12, fontWeight: 600, color: upvoted ? 'var(--accent)' : 'var(--text3)', fontFamily: 'var(--font-head)' }}>{count >= 1000 ? (count/1000).toFixed(1)+'k' : count}</span>
        </button>
      </div>

      {/* Footer */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 12, borderTop: '1px solid var(--border)', flexWrap: 'wrap', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <Icon name="star" size={12} color="var(--accent)" />
            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>{tool.rating}</span>
            <span style={{ fontSize: 12, color: 'var(--text3)' }}>({tool.reviews})</span>
          </div>
          <span style={{ fontSize: 12, color: 'var(--text3)' }}>|</span>
          <span style={{ fontSize: 12, color: 'var(--text3)', fontWeight: 500 }}>{tool.pricing}</span>
        </div>
        <div style={{ display: 'flex', gap: 4 }}>
          {tool.platforms.slice(0, 2).map(p => (
            <span key={p} style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: 'rgba(255,255,255,0.05)', color: 'var(--text3)', fontWeight: 500 }}>{p}</span>
          ))}
          {tool.platforms.length > 2 && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: 'rgba(255,255,255,0.05)', color: 'var(--text3)' }}>+{tool.platforms.length - 2}</span>}
        </div>
      </div>
    </div>
  );
}

    .filter(t => filterCat === 'all' || t.category === filterCat)

    <section id="discover" style={{ padding: '80px 24px', background: 'var(--bg)' }}>

function SubmitCTA() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({ name: '', url: '', category: '', email: '' });
  const [submitted, setSubmitted] = useState(false);

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const inputStyle = {
    width: '100%', padding: '12px 16px', borderRadius: 10, background: 'rgba(255,255,255,0.05)',

  const labelStyle = {
    fontSize: 12, fontWeight: 600, color: 'var(--text2)', display: 'block',
    marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.06em',
  };

  return (
    <section id="submit" style={{ padding: '80px 24px', borderTop: '1px solid var(--border)', background: 'var(--bg2)' }}>

            Built something great?<br />Get in front of 48K professionals.
          </h2>
          <p style={{ fontSize: 15, color: 'var(--text2)', lineHeight: 1.75, marginBottom: 28 }}>
            Submit your AI tool and our editors will review it within 5 business days. Listings are free and always will be.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {['Free to list — always', 'Editorial review in 5 business days', 'Status updates via email', 'Update your listing at any time'].map(item => (
              <div key={item} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 20, height: 20, borderRadius: '50%', background: 'var(--accent-dim)', border: '1px solid var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name="check" size={11} color="var(--accent)" />

                <span style={{ fontSize: 14, color: 'var(--text2)' }}>{item}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Right: Form */}
        <div style={{ background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 16, padding: '32px 28px' }}>
          {submitted ? (
            <div style={{ textAlign: 'center', padding: '40px 0' }}>
              <div style={{ width: 56, height: 56, borderRadius: '50%', background: 'var(--accent-dim)', border: '1px solid var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                <Icon name="check" size={24} color="var(--accent)" />
              </div>
              <h3 style={{ fontFamily: 'var(--font-head)', fontSize: 20, fontWeight: 700, color: 'var(--text)', marginBottom: 8 }}>Submission received!</h3>
              <p style={{ fontSize: 14, color: 'var(--text2)' }}>We'll review your tool and email you at <strong style={{ color: 'var(--text)' }}>{form.email}</strong> within 5 business days.</p>
              <button onClick={() => { setSubmitted(false); setStep(0); setForm({ name: '', url: '', category: '', email: '' }); }} style={{ marginTop: 24, padding: '10px 24px', borderRadius: 8, background: 'transparent', border: '1px solid var(--border2)', color: 'var(--text2)', fontSize: 14, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>Submit another</button>
            </div>
          ) : (
            <>
              {/* Progress bar */}
              <div style={{ display: 'flex', gap: 6, marginBottom: 28 }}>
                {[0, 1].map(s => (
                  <div key={s} style={{ flex: 1, height: 3, borderRadius: 2, background: s <= step ? 'var(--accent)' : 'var(--border2)', transition: 'background 0.3s' }} />
                ))}
              </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div>
                    <label style={labelStyle}>Tool name *</label>
                    <input value={form.name} onChange={e => update('name', e.target.value)} placeholder="e.g. Perplexity AI" style={inputStyle}
                    onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--border2)'} />
                  </div>
                  <div>
                    <label style={labelStyle}>Website URL *</label>
                    <input value={form.url} onChange={e => update('url', e.target.value)} placeholder="https://your-tool.com" style={inputStyle}
                    onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--border2)'} />
                  </div>
                  <div>
                    <label style={labelStyle}>Category *</label>
                    <select value={form.category} onChange={e => update('category', e.target.value)} style={{ ...inputStyle, cursor: 'pointer' }}>

                      {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                    </select>
                  </div>
                  <button onClick={() => form.name && form.url && form.category && setStep(1)} style={{
                    padding: '12px', borderRadius: 10, background: 'var(--accent)', border: 'none',
                    color: '#000', fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'var(--font-body)',
                    opacity: form.name && form.url && form.category ? 1 : 0.4, transition: 'opacity 0.15s', marginTop: 4,
                  }}>Continue →</button>
                </div>
              )}

              {step === 1 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div style={{ padding: '14px 16px', background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)', borderRadius: 10 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>{form.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text3)' }}>{form.url}</div>
                  </div>
                  <div>
                    <label style={labelStyle}>Your email *</label>
                    <input value={form.email} onChange={e => update('email', e.target.value)} placeholder="you@company.com" type="email" style={inputStyle}
                    onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                    onBlur={e => e.target.style.borderColor = 'var(--border2)'} />
                  </div>
                  <p style={{ fontSize: 12, color: 'var(--text3)', lineHeight: 1.6 }}>We'll use this to send you status updates. We don't share your email with anyone.</p>
                  <div style={{ display: 'flex', gap: 10 }}>
                    <button onClick={() => setStep(0)} style={{ flex: 1, padding: '12px', borderRadius: 10, background: 'transparent', border: '1px solid var(--border2)', color: 'var(--text2)', fontSize: 14, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>← Back</button>
                    <button onClick={() => form.email && setSubmitted(true)} style={{
                      flex: 2, padding: '12px', borderRadius: 10, background: 'var(--accent)', border: 'none',
                      color: '#000', fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'var(--font-body)',
                      opacity: form.email ? 1 : 0.4, transition: 'opacity 0.15s',
                    }}>Submit tool</button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </section>
  );
}

                  >{l}</a>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 24, borderTop: '1px solid var(--border)', flexWrap: 'wrap', gap: 12 }}>
          <span style={{ fontSize: 13, color: 'var(--text3)' }}>© 2026 PromptBulletin. All rights reserved.</span>
          <div style={{ display: 'flex', gap: 20 }}>
            {['Privacy', 'Terms', 'Disclosures'].map(l => (
              <a key={l} href="#" style={{ fontSize: 13, color: 'var(--text3)', textDecoration: 'none', transition: 'color 0.15s' }}
              onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
              onMouseLeave={e => e.currentTarget.style.color = 'var(--text3)'}
              >{l}</a>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroSize": 64,
  "accentHue": 52,
  "accentHue2": 198,
  "density": "default"
}/*EDITMODE-END*/;

function TweaksWrapper({ tweaks, setTweak }) {
  return (
    <TweaksPanel>
      <TweakSection label="Typography">
        <TweakSlider label="Hero font size" min={40} max={88} step={2} value={tweaks.heroSize} onChange={v => setTweak('heroSize', v)} />
      </TweakSection>
      <TweakSection label="Colors">
        <TweakSlider label="Primary accent hue" min={0} max={360} step={1} value={tweaks.accentHue} onChange={v => setTweak('accentHue', v)} />
        <TweakSlider label="Secondary accent hue" min={0} max={360} step={1} value={tweaks.accentHue2} onChange={v => setTweak('accentHue2', v)} />
      </TweakSection>
      <TweakSection label="Layout">
        <TweakRadio label="Density" options={['compact', 'default', 'spacious']} value={tweaks.density} onChange={v => setTweak('density', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent',      `oklch(72% 0.19 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-dim',  `oklch(72% 0.19 ${tweaks.accentHue} / 0.15)`);
    document.documentElement.style.setProperty('--accent2',     `oklch(72% 0.19 ${tweaks.accentHue2})`);
    document.documentElement.style.setProperty('--accent2-dim', `oklch(72% 0.19 ${tweaks.accentHue2} / 0.12)`);
  }, [tweaks.accentHue, tweaks.accentHue2]);

  return (
    <div>
      <TweaksWrapper tweaks={tweaks} setTweak={setTweak} />
      <Navbar />
      <main>
        <Hero tweaks={tweaks} />
        <Categories />
        <Discover />
        <Features />
        <Blog />
        <About />
        <FAQ />
        <SubmitCTA />
        <Newsletter />
      </main>
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
